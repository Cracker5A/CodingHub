<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodingHub - Login/Sign Up</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: url(/Images/wallpaper-hd-laptop.jpg) no-repeat center center/cover;
            overflow: hidden;
            background-blend-mode: darken;
            background-size: cover;
        }

        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: -1;
        }

        header {
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .navbar img {
            border-radius: 5px;
        }

        .navbar ul {
            list-style: none;
            display: flex;
            align-items: center;
        }

        .navbar ul li {
            margin: 0 10px;
        }

        .navbar ul li a {
            text-decoration: none;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.3s, color 0.3s;
        }

        .navbar ul li a:hover {
            background: white;
            color: black;
        }

        .container {
            position: relative;
            width: 400px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .tabs {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .tabs span {
            flex: 1;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            transition: background 0.3s, color 0.3s;
        }

        .tabs span.active {
            background: rgba(255, 255, 255, 0.3);
            color: black;
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        .form input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            outline: none;
        }

        .form button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .form button:hover {
            background: #0056b3;
        }

        .form a {
            display: block;
            text-align: center;
            margin-top: 10px;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .form a:hover {
            text-decoration: underline;
        }

        /* Media Queries for Responsiveness */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .navbar ul {
                flex-direction: column;
                width: 100%;
            }

            .navbar ul li {
                margin: 5px 0;
            }

            .container {
                width: 90%;
            }

            .tabs span {
                padding: 8px;
                font-size: 14px;
            }

            .form input,
            .form button {
                font-size: 14px;
                padding: 8px;
            }
        }

        @media (max-width: 480px) {
            .navbar img {
                width: 40px;
            }

            .navbar ul li a {
                font-size: 12px;
                padding: 8px;
            }

            .tabs span {
                font-size: 12px;
            }

            .form input,
            .form button {
                font-size: 12px;
                padding: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="background-overlay"></div>

    <header>
        <nav class="navbar">
            <a href="/index.html"><img src="/Images/Main.png" alt="logo" width="50px"></a>
            <ul class="pages">
                <li><a href="/index.html">Home</a></li>
                <li><a href="#courses">Courses</a></li>
                <li><a href="/contact.html">Contact</a></li>
                <li><a href="/support.html">Support US</a></li>
                <li><a href="/about.html">About</a></li>
            </ul>
            <ul class="login">
                <li><a href="/user.html">Login/SignUp</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="tabs">
            <span class="tab active" data-target="login">Login</span>
            <span class="tab" data-target="signup">Sign Up</span>
        </div>
        <div class="form active" id="login">
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
            <button>Login</button>
            <a href="#">Forgot Password?</a>
        </div>
        <div class="form" id="signup">
            <input type="text" placeholder="Username">
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
            <button>Sign Up</button>
        </div>
    </div>

    <script>
        const tabs = document.querySelectorAll('.tab');
        const forms = document.querySelectorAll('.form');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                forms.forEach(f => f.classList.remove('active'));

                tab.classList.add('active');
                document.getElementById(tab.dataset.target).classList.add('active');
            });
        });
    </script>
</body>
</html>
